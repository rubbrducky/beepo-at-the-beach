.bb-wrap{position:relative;width:100%;height:100vh;height:100dvh;background:#a9dcee;overflow:hidden;font-family:'Arial Rounded MT Bold','Trebuchet MS','Comic Sans MS',system-ui,sans-serif;}

@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5deg)}}

@keyframes drift{to{transform:translateX(-2400px)}}

.cl2{animation:drift 115s linear infinite}
.cl3{animation:drift 145s linear infinite}
@keyframes sailD{to{transform:translateX(-2200px)}}
.farSail{animation:sailD 95s linear infinite}
@keyframes flapW{0%,100%{transform:rotate(10deg)}50%{transform:rotate(-42deg)}}

@keyframes bwF{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.3)}}
