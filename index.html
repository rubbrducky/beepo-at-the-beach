.bb-wrap{position:relative;width:100%;height:100vh;height:100dvh;background:#a9dcee;overflow:hidden;font-family:'Arial Rounded MT Bold','Trebuchet MS','Comic Sans MS',system-ui,sans-serif;}
.bb-wrap svg{display:block;width:100%;height:100%;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
@keyframes waddle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg) translateY(-5px)}}
.bp-walk{animation:waddle .46s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 62%}
@keyframes stepA{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.bp-walk .ftA{animation:stepA .46s ease-in-out infinite}
.bp-walk .ftB{animation:stepA .46s ease-in-out infinite;animation-delay:.23s}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.bobble{animation:bobble 1.6s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5deg)}}
.sway{animation:sway 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
@keyframes puls{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
.pulse{animation:puls 1.1s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes puls2{0%,100%{opacity:.35}50%{opacity:1}}
.pulse2{animation:puls2 .9s ease-in-out infinite}
@keyframes twk{0%,100%{opacity:.2}50%{opacity:1}}
.tw{animation:twk 1.3s ease-in-out infinite}
@keyframes arrB{0%,100%{transform:translateX(0)}50%{transform:translateX(16px)}}
.arrowB{animation:arrB .8s ease-in-out infinite}
@keyframes wvA{to{transform:translateX(-280px)}}
.w1{animation:wvA 8s linear infinite}
@keyframes wvB{to{transform:translateX(-240px)}}
.w2{animation:wvB 6.2s linear infinite}
@keyframes wvC{to{transform:translateX(-200px)}}
.w3{animation:wvC 4.8s linear infinite}
@keyframes lap{0%,100%{transform:translateX(0)}50%{transform:translateX(-14px)}}
.foamLap{animation:lap 3.4s ease-in-out infinite}
@keyframes drift{to{transform:translateX(-2400px)}}
.cl1{animation:drift 85s linear infinite}
.cl2{animation:drift 115s linear infinite}
.cl3{animation:drift 145s linear infinite}
@keyframes sailD{to{transform:translateX(-2200px)}}
.farSail{animation:sailD 95s linear infinite}
@keyframes flapW{0%,100%{transform:rotate(10deg)}50%{transform:rotate(-42deg)}}
.flapA{animation:flapW .22s ease-in-out infinite;transform-box:fill-box;transform-origin:100% 100%}
@keyframes gullBobK{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.gullBob{animation:gullBobK 2.1s ease-in-out infinite}
@keyframes bwF{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.3)}}
.bwingL{animation:bwF .3s ease-in-out infinite;transform-box:fill-box;transform-origin:100% 50%}
.bwingR{animation:bwF .3s ease-in-out infinite;transform-box:fill-box;transform-origin:0% 50%}
@keyframes bflyD{0%{transform:translate(0,0)}25%{transform:translate(26px,-20px)}50%{transform:translate(4px,-38px)}75%{transform:translate(-24px,-16px)}100%{transform:translate(0,0)}}
.bfly{animation:bflyD 7s ease-in-out infinite}
@keyframes fadeT{0%{opacity:0;transform:translateY(-14px)}12%{opacity:1;transform:translateY(0)}75%{opacity:1}100%{opacity:0}}
.titleF{animation:fadeT 4s ease forwards}
.rot-ov{position:absolute;inset:0;background:#a9dcee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#4a3a33;font-size:22px;font-weight:700;z-index:5;text-align:center;padding:24px}
@media (prefers-reduced-motion:reduce){.bb-wrap *{animation-duration:.01s!important;animation-iteration-count:1!important}}
